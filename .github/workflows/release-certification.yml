name: release-certification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  packed-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.19.0, 24.x]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    env:
      PI_OFFLINE: "1"
      PI_SKIP_VERSION_CHECK: "1"
      PI_TELEMETRY: "0"
      CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          # The upgrade witness git-archives exact executable predecessor aa3e377.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Complete deterministic offline gate
        run: npm test
      - name: Deterministic docs-freshness gate (C0–C11)
        run: node scripts/docs-verify.mjs
      - name: Packed generic-repository migration rehearsals
        run: npm run test:packed-migration
      - run: npm run pack:dry-run
      - name: Packed generic-repository install
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json > pack.json
          TARBALL=$(node -e "const p=require('./pack.json'); process.stdout.write(p[0].filename)")
          mkdir packed-proof
          cd packed-proof
          npm init -y >/dev/null
          npm install --offline --ignore-scripts --omit=dev --legacy-peer-deps --no-audit --no-fund "../${TARBALL}"
          node node_modules/pi-autopilot/dist/src/cli/autopilot-coordinator.js --help
          node node_modules/pi-autopilot/dist/src/cli/autopilot-agent-run.js --help

  release-security-and-scale:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PI_OFFLINE: "1"
      PI_SKIP_VERSION_CHECK: "1"
      PI_TELEMETRY: "0"
      CI: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:model
      - run: npm run test:scale
      - run: npm run security:scan
      - run: npm run security:audit
      - run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: security-and-sbom
          path: artifacts/security/*.json
          if-no-files-found: error
